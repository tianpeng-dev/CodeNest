server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: codenest-backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:codenest}
    username: ${POSTGRES_USER:codenest}
    password: ${POSTGRES_PASSWORD:codenest}
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CLERK_ISSUER}
          jwk-set-uri: ${CLERK_JWKS_URI}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

codenest:
  cors:
    allowed-origins: ${CODENEST_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    endpoint: ${S3_ENDPOINT:}
    region: ${S3_REGION:auto}
    bucket: ${S3_BUCKET:codenest-dev}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    public-base-url: ${S3_PUBLIC_BASE_URL:}
    path-style: ${S3_PATH_STYLE:true}
