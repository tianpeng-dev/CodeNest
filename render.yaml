databases:
  - name: codenest-postgres
    databaseName: codenest_dtb6
    user: codenest
    plan: free
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: web
    name: codenest-backend
    runtime: docker
    plan: free
    region: oregon
    repo: https://github.com/tianpeng-dev/CodeNest.git
    branch: master
    autoDeploy: true
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/v3/api-docs
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: default
      - key: CODENEST_CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,https://codenest-tp.netlify.app,https://master--codenest-tp.netlify.app
      - key: POSTGRES_HOST
        fromDatabase:
          name: codenest-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: codenest-postgres
          property: port
      - key: POSTGRES_DATABASE
        fromDatabase:
          name: codenest-postgres
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: codenest-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: codenest-postgres
          property: password
      - key: CLERK_ISSUER
        value: https://present-warthog-36.clerk.accounts.dev
      - key: CLERK_JWKS_URI
        value: https://present-warthog-36.clerk.accounts.dev/.well-known/jwks.json
      - key: S3_ENDPOINT
        value: https://77e355bb031ae797643a27a40d045b19.r2.cloudflarestorage.com
      - key: S3_REGION
        value: auto
      - key: S3_BUCKET
        value: codenest-uploads
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      - key: S3_PATH_STYLE
        value: true
